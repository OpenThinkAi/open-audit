name: release

# Fires on every push to main. Reads the version from Cargo.toml; if
# open-audit@<version> isn't already on npm, runs the full release flow:
# cross-compile binaries, create a GitHub Release at v<version>, publish
# the npm wrapper via OIDC Trusted Publishing.
#
# Idempotent: every push to main that doesn't bump the version is a no-op.
# Matches the OpenThinkAi pattern (see stamp-cli/.github/workflows/publish.yml).
#
# Auth model:
# - npm: OIDC Trusted Publishing (no NPM_TOKEN secret)
# - GitHub Release + tag creation: GITHUB_TOKEN (no PAT secret)
#
# Note: this REPLACES dist's tag-triggered release.yml. We use dist for the
# build/cross-compile work but drive the trigger + release-creation ourselves
# so the flow matches sibling repos. dist init / generate would overwrite
# this — allow-dirty=["ci"] in Cargo.toml prevents that.
#
# Known regression vs dist's default: this workflow does NOT run on PRs.
# The original ran `dist plan` on PR pushes as a "would this build?" check.
# We rely on the stamp-loop pre-merge review instead. If silent breakage of
# the release pipeline becomes a problem, add a separate `pr-checks.yml`
# that runs `dist plan` on pull_request events.

on:
  push:
    branches: [main]

# Don't run two releases in parallel — they'd race on `gh release create`
# and the npm publish gate. cancel-in-progress: false so a fast double-push
# still completes both runs sequentially (the second is a no-op if the first
# already shipped the version).
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write   # creating GitHub Releases + pushing tags
  id-token: write   # OIDC for npm trusted publishing

jobs:
  release:
    runs-on: macos-14   # cross-compiles to all targets via cargo-zigbuild
    timeout-minutes: 25
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: read version from Cargo.toml
        id: version
        run: |
          VERSION=$(cargo metadata --format-version 1 --no-deps \
            | jq -r '.packages[] | select(.name == "open-audit") | .version')
          if [ -z "$VERSION" ] || [ "$VERSION" = "null" ]; then
            echo "could not read open-audit version via cargo metadata" >&2
            echo "expected a [package] block in Cargo.toml with name = \"open-audit\"" >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
          echo "open-audit version: $VERSION"

      - name: check if already published to npm
        id: check_npm
        run: |
          if npm view "open-audit@${{ steps.version.outputs.version }}" version >/dev/null 2>&1; then
            echo "published=true" >> "$GITHUB_OUTPUT"
            echo "open-audit@${{ steps.version.outputs.version }} already on npm — skipping release."
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
            echo "open-audit@${{ steps.version.outputs.version }} not on npm — proceeding."
          fi

      - name: install rust toolchain
        if: steps.check_npm.outputs.published == 'false'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin,x86_64-unknown-linux-gnu,x86_64-unknown-linux-musl

      - name: install zig + cargo-zigbuild + cargo-dist
        if: steps.check_npm.outputs.published == 'false'
        run: |
          brew install zig cargo-zigbuild cargo-dist

      - name: dist build (cross-compile + npm wrapper + installer)
        if: steps.check_npm.outputs.published == 'false'
        run: |
          dist build --artifacts=all --tag "${{ steps.version.outputs.tag }}"
          ls -la target/distrib/

      - name: setup node
        if: steps.check_npm.outputs.published == 'false'
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: create or update github release + upload binaries
        if: steps.check_npm.outputs.published == 'false'
        # Idempotent across partial failures: if the previous run created
        # the release but failed at npm publish, this run uploads (with
        # --clobber) into the existing release instead of erroring on
        # "release already exists." Matters because the npm gate above is
        # the source of truth for "is this version shipped" — a created-
        # but-empty release shouldn't block npm retry.
        #
        # Globs cover any `open-audit-*.tar.xz` so adding a new target in
        # dist's config doesn't require a workflow edit.
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          ASSETS=( target/distrib/open-audit-*.tar.xz \
                   target/distrib/open-audit-installer.sh \
                   target/distrib/sha256.sum \
                   target/distrib/source.tar.gz )
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "release $TAG already exists — re-uploading assets"
            gh release upload "$TAG" "${ASSETS[@]}" --clobber
          else
            gh release create "$TAG" \
              --title "$TAG" \
              --target "$GITHUB_SHA" \
              --generate-notes \
              "${ASSETS[@]}"
          fi

      - name: publish npm wrapper (OIDC)
        if: steps.check_npm.outputs.published == 'false'
        # Node 22 ships npm 10.x; OIDC publish auth needs npm 11.5.1+.
        # npx fetches a clean npm@latest per-run without disturbing the
        # globally-installed npm. Same pattern as stamp-cli.
        run: |
          npx -y npm@latest publish --access public --provenance \
            target/distrib/open-audit-npm-package.tar.gz
