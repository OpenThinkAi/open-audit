branches:
  main:
    required:
      - security
      - rust
      - product
    required_checks:
      - name: build
        run: cargo build --locked
      - name: test
        run: cargo test --locked
reviewers:
  security:
    prompt: .stamp/reviewers/security.md
  rust:
    prompt: .stamp/reviewers/rust.md
  product:
    prompt: .stamp/reviewers/product.md
